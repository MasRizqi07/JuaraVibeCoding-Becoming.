<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Becoming.</title>
    <script>
      // Gracefully prevent benign developer sandbox websocket connection rejections from triggering full screen overlays.
      window.addEventListener('unhandledrejection', function(event) {
        const reason = event.reason;
        const msg = (reason && (reason.message || reason.stack || String(reason))) || '';
        if (msg.toLowerCase().includes('websocket') || msg.toLowerCase().includes('ws://') || msg.toLowerCase().includes('wss://')) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      });
      window.addEventListener('error', function(event) {
        const msg = event.message || '';
        if (msg.toLowerCase().includes('websocket') || msg.toLowerCase().includes('vite')) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
